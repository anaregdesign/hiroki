interface:
  display_name: "Spec Driven Workflow"
  short_description: "Own /doc/spec and /doc/plan.md planning workflow"
  default_prompt: "Use $spec-driven-workflow when the work needs /doc/spec documentation plus a temporary /doc/plan.md organized as ordered `Section`, `Subsection`, and optional `Sub-subsection` blocks. If the incoming instruction is overly detailed or repetitive, propose a higher-level goal framing, preserve true constraints and acceptance criteria, and ask the instruction giver to review that framing before using it. Keep the plan current during implementation, record progress in deliberate Conventional Commits work units when the repository uses them, and delete the plan once all tracked work is done. Do not use it to decide app-code architecture or cloud platform topology."
