interface:
  display_name: "Spec Driven Workflow"
  short_description: "Default spec-first workflow for non-trivial app development"
  default_prompt: "Use $spec-driven-workflow by default for non-trivial application-development requests, even when the user asks directly for implementation and does not mention /docs/spec or /docs/plans/plan.md. This includes building, bootstrapping, changing, refactoring, or extending an app, feature, route, UI, API, workflow, or service. Capture user-visible requirements under /docs/spec, create a temporary /docs/plans/plan.md organized as ordered `Section`, `Subsection`, and optional `Sub-subsection` blocks, keep the plan current during implementation, and archive the completed plan as /docs/plans/plan.YYYYMMDD-HHMMSS.md once all tracked work is done. If the incoming instruction is overly detailed or repetitive, propose a higher-level goal framing, preserve true constraints and acceptance criteria, and ask the instruction giver to review that framing before using it. Pair this skill with the relevant coding or hosting skill after the spec and plan are in place. Do not use it to decide app-code architecture or cloud platform topology."
