interface:
  display_name: "Azure SPA Clean Architecture"
  short_description: "Own Azure platform, identity, and GitHub deploy automation"
  default_prompt: "Use $azure-spa-clean-architecture-bootstrap together with $enforce-react-spa-architecture when the work is primarily Azure hosting, secretless config, Microsoft Entra ID only when end-user authentication is required, or GitHub Actions OIDC delivery that must deploy both infrastructure and the application. Front-load required Azure permissions, including any role-assignment permission the IaC deploy needs, keep runtime Managed Identity separate from the GitHub deploy identity, and prefer Container Apps plus Azure SQL Private Endpoint over SQL firewall exceptions."
