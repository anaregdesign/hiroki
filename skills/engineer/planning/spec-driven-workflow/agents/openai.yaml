interface:
  display_name: "Spec Driven Workflow"
  short_description: "Default spec-first workflow for non-trivial app work"
  default_prompt: "Use $spec-driven-workflow for non-trivial application-development work: write the current ideal requirement under /docs/spec, track execution in /docs/plans/plan.md, surface technical infeasibility, unresolved high-risk technical assumptions, contradictions, ambiguity, or redundancy before relying on them, and archive the completed plan when the current delivery slice is done."
